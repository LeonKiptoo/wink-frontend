<body>
  <div id="backend-progress" class="backend-progress" aria-hidden="true"><div class="backend-progress-track"><div class="backend-progress-shimmer"></div></div></div>
  <div id="toast"></div>
  <div id="status-banner">
    <div class="status-dot"></div>
    <div id="status-copy">Wink is waking up. This can take a moment on the free tier.</div>
  </div>

  <div id="auth">
    <section class="auth-shell">
      <div class="auth-card" id="auth-card">
        <div class="auth-card-brand">
          <div class="auth-logo">Wink</div>
          <div class="auth-subbrand">By Wnkia</div>
        </div>
        <h1>Welcome to Wink</h1>
        <p>Sign in to continue.</p>
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-in" onclick="stab('in')">Sign in</button>
          <button class="auth-tab" id="tab-up" onclick="stab('up')">Create account</button>
        </div>
        <div class="alert error" id="auth-error"></div>
        <div class="alert ok" id="auth-msg"></div>
        <div id="signin-form">
          <div class="field"><label>Email</label><input id="signin-email" type="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doIn()" /></div>
          <div class="field"><label>Password</label><input id="signin-password" type="password" placeholder="At least 8 characters" onkeydown="if(event.key==='Enter')doIn()" /></div>
          <button class="btn primary" id="signin-btn" onclick="doIn()">Sign in</button>
        </div>
        <div id="signup-form" style="display:none">
          <div class="field"><label>Full name</label><input id="signup-name" type="text" placeholder="Your name" /></div>
          <div class="field"><label>Email</label><input id="signup-email" type="email" placeholder="you@example.com" /></div>
          <div class="field"><label>Password</label><input id="signup-password" type="password" placeholder="At least 8 characters" onkeydown="if(event.key==='Enter')doUp()" /></div>
          <button class="btn primary" id="signup-btn" onclick="doUp()">Create account</button>
        </div>
        <div class="auth-divider">or</div>
        <button class="google-btn" id="google-btn" onclick="doGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"></path>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
          </svg>
          Continue with Google
        </button>
      </div>
    </section>
  </div>

  <div id="app">
    <div class="shell">
      <aside class="panel sidebar" id="sidebar"></aside>
      <main class="panel workspace" id="workspace"></main>
      <aside class="panel inspector" id="inspector"></aside>
    </div>
  </div>

  <div class="modal-backdrop" id="upload-backdrop"></div>
  <div class="modal-backdrop" id="account-backdrop"></div>

  <script src="./config.js"></script>
  <script src="./state.js"></script>
  <script src="./ui.js"></script>
  <script src="./api.js"></script>
  <script src="./app.js"></script>
